---
- name: Check if restic is installed ({{ restic_client_version }})
  ansible.builtin.command:
    cmd: /usr/local/bin/restic version
  ignore_errors: true
  changed_when: false
  register: check_restic_version

- name: Install restic binary
  when: check_restic_version is failed or restic_client_version not in check_restic_version.stdout
  block:
    - name: Download compressed restic_{{ restic_client_version }}
      ansible.builtin.get_url:
        url: '{{ restic_client_repo_url }}/releases/download/v{{ restic_client_version }}/restic_{{ restic_client_version }}_linux_amd64.bz2'
        checksum: 'sha256:{{ restic_client_repo_url }}/releases/download/v{{ restic_client_version }}/SHA256SUMS'
        dest: /tmp/restic_{{ restic_client_version }}.bz2
        owner: root
        group: root
        mode: '0644'

    - name: Decompress restic ({{ restic_client_version }})
      ansible.builtin.command:
        cmd: bzip2 --decompress /tmp/restic_{{ restic_client_version }}.bz2

    - name: Ensure restic is installed ({{ restic_client_version }})
      ansible.builtin.copy:
        src: /tmp/restic_{{ restic_client_version }}
        dest: /usr/local/bin/restic
        remote_src: true
        owner: root
        group: root
        mode: '0755'

    - name: Ensure temporary file is removed
      ansible.builtin.file:
        path: /tmp/restic_{{ restic_client_version }}
        state: absent
