---
argument_specs:
  main:
    options:
      restic_client_version:
        description: Restic version to install.
        type: str
        default: 0.18.0
      restic_client_platform:
        description: Restic client platform.
        type: str
        default: linux
      restic_client_arch:
        description: Restic client architecture.
        type: str
        default: amd64
      restic_client_repo_url:
        description: Restic repository URL.
        type: str
        default: https://github.com/restic/restic
